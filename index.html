<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Route Planner</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrolling, app is fullscreen */
        }
        
        #map {
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        /* Custom UI floating over the map */
        #ui-panel {
            z-index: 1000;
        }

        /* Custom Waypoint Marker Styling */
        .waypoint-marker {
            background-color: #2563eb; /* Tailwind blue-600 */
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            border: 3px solid white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.1s ease;
        }

        .waypoint-marker:hover {
            transform: scale(1.1);
        }

        /* Hide map attribution for a cleaner app look (optional, but good for immersion) */
        .leaflet-control-attribution {
            display: none !important;
        }

        .airport-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563; /* text-gray-600 */
            transition: color 0.2s, transform 0.2s;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }

        .airport-icon:hover {
            color: #2563eb; /* text-blue-600 */
            transform: scale(1.2) rotate(-15deg);
        }

        /* Compass Tool Styles */
        .compass-control-btn {
            background-color: white;
            border: 2px solid rgba(0,0,0,0.2);
            background-clip: padding-box;
            border-radius: 4px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 1px 5px rgba(0,0,0,0.65);
            transition: background-color 0.2s, color 0.2s;
        }
        .compass-control-btn:hover {
            background-color: #f3f4f6;
        }
        .compass-control-btn.active {
            background-color: #2563eb;
            color: white;
            border-color: #1d4ed8;
        }
        
        /* Ruler Tool Styles */
        .ruler-control-btn {
            background-color: white;
            border: 2px solid rgba(0,0,0,0.2);
            background-clip: padding-box;
            border-radius: 4px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 1px 5px rgba(0,0,0,0.65);
            transition: background-color 0.2s, color 0.2s;
        }
        .ruler-control-btn:hover {
            background-color: #f3f4f6;
        }
        .ruler-control-btn.active {
            background-color: #10b981;
            color: white;
            border-color: #059669;
        }
        
        /* Forces crosshair when measuring */
        .crosshair-cursor-map {
            cursor: crosshair !important;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Floating UI Panel -->
    <div id="ui-panel" class="absolute bottom-0 left-0 right-0 p-4 sm:p-6 pointer-events-none">
        <div class="max-w-5xl mx-auto bg-white/95 backdrop-blur-md shadow-2xl rounded-2xl p-5 sm:p-6 pointer-events-auto border border-gray-200 transition-all flex flex-col gap-4">
            
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                <div>
                    <h2 class="text-xl sm:text-2xl font-bold text-gray-900">Flight Route Generator</h2>
                    <p class="text-sm text-gray-500">Click the map or search airports to build your route.</p>
                </div>
                <div class="text-sm font-semibold text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-100 hidden sm:block" id="stats-badge">
                    0 Waypoints
                </div>
            </div>

            <div class="relative w-full z-[1001]">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                    </svg>
                </div>
                <input type="text" id="airport-search" autocomplete="off"
                    class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" 
                    placeholder="Search airports (e.g., JFK, London Heathrow)...">
                
                <!-- Search Results Dropdown -->
                <ul id="search-results" class="absolute w-full mt-2 bg-white border border-gray-200 rounded-xl shadow-xl overflow-hidden hidden max-h-60 overflow-y-auto z-[2000]">
                    <!-- Dynamically populated via JS -->
                </ul>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
                <!-- Route String Output box -->
                <input type="text" id="route-output" 
                    class="flex-grow bg-gray-50 border border-gray-300 p-3 sm:p-4 rounded-xl font-mono text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" 
                    readonly 
                    placeholder="E.g. 002934N093243W ...">
                
                <!-- Action Buttons -->
                <div class="flex gap-2 sm:gap-3">
                    <button id="copy-btn" class="flex-1 sm:flex-none bg-blue-600 text-white px-5 py-3 rounded-xl font-semibold hover:bg-blue-700 active:bg-blue-800 transition-colors shadow-sm flex items-center justify-center gap-2 min-w-[100px]">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                            <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                        </svg>
                        Copy
                    </button>
                    <button id="undo-btn" class="flex-1 sm:flex-none bg-gray-100 text-gray-700 px-5 py-3 rounded-xl font-semibold hover:bg-gray-200 active:bg-gray-300 transition-colors border border-gray-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        Undo
                    </button>
                    <button id="clear-btn" class="flex-1 sm:flex-none bg-red-50 text-red-600 px-5 py-3 rounded-xl font-semibold hover:bg-red-100 active:bg-red-200 transition-colors border border-red-100 disabled:opacity-50 disabled:cursor-not-allowed">
                        Clear
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast (Hidden by default) -->
    <div id="toast" class="absolute top-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full font-medium shadow-lg z-[2000] opacity-0 transition-opacity duration-300 pointer-events-none">
        Copied to clipboard!
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="absolute hidden bg-white shadow-xl rounded-lg py-2 border border-gray-200 z-[3000] min-w-[150px]">
        <button id="cm-holding-point" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-700 transition-colors">
            ➕ Add Holding Point
        </button>
        <button id="cm-draw-hold" class="w-full text-left px-4 py-2 text-sm text-orange-600 hover:bg-orange-50 transition-colors border-b border-gray-100">
            ✏️ Draw Holding Point
        </button>
        <button id="cm-delete-point" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors">
            🗑️ Delete Waypoint
        </button>
    </div>

    <!-- Draw Shape Dialog -->
    <div id="draw-shape-dialog" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white shadow-2xl rounded-2xl p-6 border border-gray-200 z-[4000] hidden w-[90%] sm:w-80 max-w-sm">
        <div class="flex justify-between items-center mb-5">
            <h3 class="text-xl font-bold text-gray-900">Interactive Hold</h3>
            <button id="draw-close-icon" class="text-gray-400 hover:text-gray-600 transition-colors bg-transparent border-0 cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="space-y-3">
            <button class="w-full shape-btn text-left px-4 py-3 border border-gray-200 rounded-xl hover:bg-orange-50 hover:border-orange-300 font-semibold text-gray-700 transition-colors" data-shape="capsule">Capsule (Racetrack)</button>
            <button class="w-full shape-btn text-left px-4 py-3 border border-gray-200 rounded-xl hover:bg-orange-50 hover:border-orange-300 font-semibold text-gray-700 transition-colors" data-shape="circle">Circle</button>
            <button class="w-full shape-btn text-left px-4 py-3 border border-gray-200 rounded-xl hover:bg-orange-50 hover:border-orange-300 font-semibold text-gray-700 transition-colors" data-shape="figure8">Figure 8 (Hourglass)</button>
        </div>
    </div>

    <!-- Holding Point Dialog -->
    <div id="holding-dialog" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white shadow-2xl rounded-2xl p-6 border border-gray-200 z-[4000] hidden w-[90%] sm:w-96 max-w-md">
        <div class="flex justify-between items-center mb-5">
            <h3 class="text-xl font-bold text-gray-900">Holding Pattern</h3>
            <button id="hold-close-icon" class="text-gray-400 hover:text-gray-600 transition-colors bg-transparent border-0 cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Pattern Shape</label>
                <select id="hold-shape" class="w-full border border-gray-300 rounded-xl p-3 bg-gray-50 text-gray-800 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm">
                    <option value="capsule">Capsule (NASCAR/Racetrack)</option>
                    <option value="circle">Circle</option>
                    <option value="figure8">Figure 8 (Hourglass)</option>
                </select>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5" title="Number of waypoints to draw the shape">Points</label>
                    <input type="number" id="hold-points" min="10" max="200" value="40" class="w-full border border-gray-300 rounded-xl p-2.5 bg-gray-50 text-gray-800 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Distance (Miles)</label>
                    <input type="number" id="hold-dist" min="0.1" step="0.1" max="1000" value="10" class="w-full border border-gray-300 rounded-xl p-2.5 bg-gray-50 text-gray-800 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Loops</label>
                    <input type="number" id="hold-loops" min="1" max="20" value="1" class="w-full border border-gray-300 rounded-xl p-2.5 bg-gray-50 text-gray-800 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Heading (°)</label>
                    <input type="number" id="hold-angle" min="0" max="359" value="90" class="w-full border border-gray-300 rounded-xl p-2.5 bg-gray-50 text-gray-800 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm">
                </div>
            </div>
            
            <div class="flex gap-3 pt-3 mt-2 border-t border-gray-100">
                <button id="hold-cancel" class="flex-1 bg-white border border-gray-300 text-gray-700 py-2.5 rounded-xl font-semibold hover:bg-gray-50 hover:text-gray-900 transition-colors shadow-sm">Cancel</button>
                <button id="hold-generate" class="flex-1 bg-blue-600 text-white py-2.5 rounded-xl font-semibold hover:bg-blue-700 active:bg-blue-800 transition-colors shadow-sm">Generate</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // UI Elements setup ...
        const routeOutput = document.getElementById('route-output');
        const statsBadge = document.getElementById('stats-badge');
        const undoBtn = document.getElementById('undo-btn');
        const clearBtn = document.getElementById('clear-btn');
        const copyBtn = document.getElementById('copy-btn');
        const toast = document.getElementById('toast');
        
        let activeWaypointIndex = -1; // Tracks right-clicked waypoint

        // Application State
        let waypoints = []; // Stores L.LatLng objects
        let markers = [];   // Stores Leaflet Marker objects
        let routePolyline = null; // Stores the Leaflet Polyline object
        
        // Initialize Map
        // We start with a global view, centered roughly over the Atlantic
        const map = L.map('map', {
            zoomControl: false // Move zoom control to top right to avoid UI overlap
        }).setView([30, -30], 3);

        L.control.zoom({
            position: 'topright'
        }).addTo(map);

        // Define multiple base map layers
        const positron = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            subdomains: 'abcd'
        });
        
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: 'Tiles &copy; Esri'
        });
        
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        });
        
        const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            subdomains: 'abcd'
        });

        // Add default layer
        positron.addTo(map);

        // Add Layer Control to switch maps
        const baseMaps = {
            "Light Mode (Default)": positron,
            "Satellite Imagery": satellite,
            "Standard Map": osm,
            "Dark Mode": dark
        };
        L.control.layers(baseMaps, null, { position: 'topright' }).addTo(map);

        // Initialize Polyline (the flight path line)
        routePolyline = L.polyline([], {
            color: '#2563eb', // Tailwind blue-600
            weight: 3,
            opacity: 0.8,
            dashArray: '10, 10', // Dashed line to look like a planned route
            lineJoin: 'round'
        }).addTo(map);

        // Major International Airports Database
        const airportsDatabase = [
            { iata: 'LHR', name: 'London Heathrow', lat: 51.4700, lng: -0.4543 },
            { iata: 'JFK', name: 'John F. Kennedy Intl', lat: 40.6413, lng: -73.7781 },
            { iata: 'LAX', name: 'Los Angeles Intl', lat: 33.9416, lng: -118.4085 },
            { iata: 'CDG', name: 'Paris Charles de Gaulle', lat: 49.0097, lng: 2.5479 },
            { iata: 'DXB', name: 'Dubai Intl', lat: 25.2532, lng: 55.3657 },
            { iata: 'FRA', name: 'Frankfurt', lat: 50.0333, lng: 8.5705 },
            { iata: 'HKG', name: 'Hong Kong Intl', lat: 22.3080, lng: 113.9185 },
            { iata: 'SYD', name: 'Sydney Kingsford Smith', lat: -33.9399, lng: 151.1753 },
            { iata: 'YYZ', name: 'Toronto Pearson', lat: 43.6777, lng: -79.6248 },
            { iata: 'SIN', name: 'Singapore Changi', lat: 1.3644, lng: 103.9915 },
            { iata: 'AMS', name: 'Amsterdam Schiphol', lat: 52.3105, lng: 4.7683 },
            { iata: 'HND', name: 'Tokyo Haneda', lat: 35.5494, lng: 139.7798 },
            { iata: 'ATL', name: 'Hartsfield-Jackson Atlanta', lat: 33.6407, lng: -84.4277 },
            { iata: 'ORD', name: 'Chicago O\'Hare', lat: 41.9742, lng: -87.9073 },
            { iata: 'DFW', name: 'Dallas/Fort Worth', lat: 32.8998, lng: -97.0403 },
            { iata: 'DEN', name: 'Denver Intl', lat: 39.8561, lng: -104.6737 },
            { iata: 'PEK', name: 'Beijing Capital', lat: 40.0799, lng: 116.6031 },
            { iata: 'ICN', name: 'Seoul Incheon', lat: 37.4602, lng: 126.4407 },
            { iata: 'MAD', name: 'Adolfo Suárez Madrid-Barajas', lat: 40.4839, lng: -3.5680 },
            { iata: 'GRU', name: 'São Paulo/Guarulhos', lat: -23.4356, lng: -46.4731 },
            { iata: 'JNB', name: 'O.R. Tambo Intl (Johannesburg)', lat: -26.1392, lng: 28.2460 }
        ];

        // Airplane SVG Icon
        const planeSvg = `<svg viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M22 16.41v-3.41l-10-6.41v-4.59c0-1.1-.9-2-2-2s-2 .9-2 2v4.59l-10 6.41v3.41l10-3.14v5.18l-2.59 1.95v2.59l4.59-1.36 4.59 1.36v-2.59l-2.59-1.95v-5.18l10 3.14z"/></svg>`;

        const airportIcon = L.divIcon({
            html: planeSvg,
            className: 'airport-icon',
            iconSize: [24, 24],
            iconAnchor: [12, 12], // Anchor in the center
            tooltipAnchor: [12, 0]
        });

        // Global Airports API State
        let globalAirports = [];
        const airportsLayer = L.layerGroup().addTo(map);
        const AIRPORT_ZOOM_THRESHOLD = 6; // Zoom level required to see airports

        // Fetch comprehensive global airport data
        async function fetchAirports() {
            try {
                showNotification('Downloading global airports database (this only happens once)...', 4000);
                
                // Fetching from a reliable open-source airport dataset
                const response = await fetch('https://raw.githubusercontent.com/mwgg/Airports/master/airports.json');
                const data = await response.json();
                
                // Convert object to array and filter out those without valid coordinates
                globalAirports = Object.values(data).filter(a => a.lat && a.lon);
                
                showNotification(`Loaded ${globalAirports.length.toLocaleString()} airports! Zoom in to view them on the map.`, 4000);
                
                // Render initial if already zoomed in
                renderAirports();
            } catch (err) {
                console.error("Failed to load airports API", err);
                showNotification("Failed to load global airports data.", 3000);
            }
        }

        // Render airports dynamically based on viewport and zoom
        function renderAirports() {
            // Only show airports if zoomed in past the threshold
            if (map.getZoom() < AIRPORT_ZOOM_THRESHOLD) {
                airportsLayer.clearLayers();
                return;
            }

            const bounds = map.getBounds();
            
            // Spatial filtering: only get airports within the current screen bounds
            const visibleAirports = globalAirports.filter(a => bounds.contains([a.lat, a.lon]));
            
            // Limit to max 300 to prevent browser lag if zoomed out over dense areas
            const airportsToDisplay = visibleAirports.slice(0, 300);

            airportsLayer.clearLayers();

            airportsToDisplay.forEach(airport => {
                const label = airport.iata ? `${airport.name} (${airport.iata})` : airport.name;
                const marker = L.marker([airport.lat, airport.lon], { icon: airportIcon })
                    .bindTooltip(label, { direction: 'top', offset: [0, -10], className: 'font-semibold font-sans' });

                // Clicking an airport adds it to the route
                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    addWaypoint(e.latlng);
                });
                
                airportsLayer.addLayer(marker);
            });
        }

        // Re-render airports whenever map is moved or zoomed
        map.on('moveend', renderAirports);

        /**
         * Converts decimal degrees to Degrees, Minutes, Seconds (DMS) string format.
         * Expected Output Format: 002934N (Lat) or 093243W (Lng)
         */
        function convertToDMS(decimal, isLat) {
            // Determine Hemisphere direction
            let dir;
            if (isLat) {
                dir = decimal >= 0 ? 'N' : 'S';
            } else {
                dir = decimal >= 0 ? 'E' : 'W';
            }

            let absVal = Math.abs(decimal);
            let degrees = Math.floor(absVal);
            
            // Calculate minutes and seconds
            let minFloat = (absVal - degrees) * 60;
            let minutes = Math.floor(minFloat);
            let seconds = Math.round((minFloat - minutes) * 60);

            // Handle rounding overflows
            if (seconds === 60) {
                seconds = 0;
                minutes += 1;
            }
            if (minutes === 60) {
                minutes = 0;
                degrees += 1;
            }

            // Pad the values to ensure fixed lengths
            // Latitude degrees are 2 digits (e.g., 05, 45, 90)
            // Longitude degrees are 3 digits (e.g., 005, 045, 180)
            let degPad = isLat ? 2 : 3;
            let dStr = String(degrees).padStart(degPad, '0');
            let mStr = String(minutes).padStart(2, '0');
            let sStr = String(seconds).padStart(2, '0');

            return `${dStr}${mStr}${sStr}${dir}`;
        }

        /**
         * Takes a Leaflet LatLng object, wraps it to standard bounds, and returns the full coordinate string.
         */
        function formatCoordinate(latlng) {
            // .wrap() ensures longitude stays between -180 and 180 even if you pan infinitely left/right
            const wrapped = latlng.wrap();
            const latStr = convertToDMS(wrapped.lat, true);
            const lngStr = convertToDMS(wrapped.lng, false);
            return latStr + lngStr;
        }

        /**
         * Updates the text input, badge, and button states based on current waypoints.
         */
        function updateUI() {
            // Generate the string: map each waypoint to its string format and join with spaces
            const routeStr = waypoints.map(wp => formatCoordinate(wp)).join(' ');
            routeOutput.value = routeStr;

            // Update stats
            statsBadge.innerText = `${waypoints.length} Waypoint${waypoints.length !== 1 ? 's' : ''}`;

            // Toggle button states
            const hasPoints = waypoints.length > 0;
            undoBtn.disabled = !hasPoints;
            clearBtn.disabled = !hasPoints;
            
            // Scroll input to the end so the newest point is visible
            routeOutput.scrollLeft = routeOutput.scrollWidth;
        }

        /**
         * Re-renders all markers and the polyline on the map from the waypoints array.
         * This ensures indexes are always correct after additions, deletions, or injecting holds.
         */
        function renderRoute() {
            // Clear existing markers
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];

            // Rebuild markers
            waypoints.forEach((wp, i) => {
                const customIcon = L.divIcon({
                    className: 'custom-div-icon', // Container class
                    html: `<div class="waypoint-marker">${i + 1}</div>`,
                    iconSize: [28, 28],
                    iconAnchor: [14, 14] // Anchor at the center of the circle
                });

                const marker = L.marker(wp, { icon: customIcon }).addTo(map);
                
                // Add right-click context menu
                marker.on('contextmenu', (e) => {
                    L.DomEvent.stopPropagation(e);
                    e.originalEvent.preventDefault(); // Prevent default browser menu
                    activeWaypointIndex = i;
                    const cm = document.getElementById('context-menu');
                    cm.style.left = e.originalEvent.pageX + 'px';
                    cm.style.top = e.originalEvent.pageY + 'px';
                    cm.classList.remove('hidden');
                });
                
                markers.push(marker);
            });

            // Update polyline
            routePolyline.setLatLngs(waypoints);
            updateUI();
        }

        /**
         * Adds a new waypoint to the map and updates data structures.
         */
        function addWaypoint(latlng) {
            waypoints.push(latlng);
            renderRoute();
        }

        // Interactive Drawing State Variables
        let isDrawingHold = false;
        let drawHoldParams = { shape: 'capsule', dist: 10, angle: 90, loops: 1, points: 40 };
        let drawHoldActiveIndex = -1;
        let lastMouseLatLng = null;

        const rotateIncrements = [5, 1, 0.5];
        let currentRotateIdx = 0; // Starts at 5°

        const scaleIncrements = [0.1, 1, 10];
        let currentScaleIdx = 1; // Starts at 1mi

        let ghostHoldLine = L.polyline([], {color: '#f97316', weight: 3, dashArray: '5, 5'}).addTo(map);

        const drawTooltip = L.tooltip({
            permanent: true,
            direction: 'right',
            className: 'font-bold text-orange-600 bg-white px-2 py-1 rounded shadow-md border border-orange-200 text-sm'
        });
        
        let drawTooltipMarker = L.marker([0,0], {
            icon: L.divIcon({className: 'hidden'}),
            interactive: false
        }).addTo(map);

        function exitDrawMode() {
            isDrawingHold = false;
            document.getElementById('map').classList.remove('crosshair-cursor-map');
            ghostHoldLine.setLatLngs([]);
            drawTooltipMarker.unbindTooltip();
            
            const drawUi = document.querySelector('.draw-tool-ui');
            if (drawUi) {
                drawUi.classList.add('hidden');
                drawUi.classList.remove('flex');
            }
            
            showNotification("Exited Drawing Mode", 2000);
        }

        // Map Click Listener
        map.on('click', function(e) {
            if (isDrawingHold) {
                const pts = generateHoldPoints(e.latlng, drawHoldParams.shape, drawHoldParams.points, drawHoldParams.dist, drawHoldParams.loops, drawHoldParams.angle);
                waypoints.splice(drawHoldActiveIndex + 1, 0, ...pts);
                renderRoute();
                exitDrawMode();
            } else if (compassActive) {
                handleCompassMapClick(e);
            } else if (rulerActive) {
                handleRulerMapClick(e);
            } else {
                addWaypoint(e.latlng);
            }
        });

        let compassActive = false;
        let compassStart = null;
        let compassLine = L.polyline([], {color: '#ef4444', weight: 3, dashArray: '5, 5'}).addTo(map);
        
        const headingTooltip = L.tooltip({
            permanent: true,
            direction: 'right',
            className: 'font-bold text-red-600 bg-white px-2 py-1 rounded shadow-md border border-red-200 text-sm'
        });
        
        // Invisible marker used purely to carry the tooltip near the cursor
        let compassTooltipMarker = L.marker([0,0], {
            icon: L.divIcon({className: 'hidden'}),
            interactive: false
        }).addTo(map);

        // Custom Leaflet Control for the Compass Button
        const CompassControl = L.Control.extend({
            options: { position: 'topright' },
            onAdd: function() {
                const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                const btn = L.DomUtil.create('a', 'compass-control-btn', container);
                btn.innerHTML = '🧭';
                btn.title = 'Measure Compass Heading';
                btn.href = '#';
                
                L.DomEvent.on(btn, 'click', L.DomEvent.stop);
                L.DomEvent.on(btn, 'click', (e) => {
                    e.preventDefault();
                    toggleCompassMode(btn);
                });
                return container;
            }
        });
        map.addControl(new CompassControl());

        function toggleCompassMode(btn) {
            // Turn off ruler if active
            if (rulerActive) {
                const rulerBtn = document.querySelector('.ruler-control-btn');
                if(rulerBtn) toggleRulerMode(rulerBtn);
            }
            
            compassActive = !compassActive;
            const mapContainer = document.getElementById('map');
            
            if (compassActive) {
                btn.classList.add('active');
                mapContainer.classList.add('crosshair-cursor-map');
                showNotification("Compass Active: Click map to set origin.", 3000);
            } else {
                btn.classList.remove('active');
                mapContainer.classList.remove('crosshair-cursor-map');
                compassStart = null;
                compassLine.setLatLngs([]);
                compassTooltipMarker.unbindTooltip();
                showNotification("Compass Deactivated.", 2000);
            }
        }

        function handleCompassMapClick(e) {
            if (!compassStart) {
                // First click sets the origin anchor
                compassStart = e.latlng;
                compassLine.setLatLngs([compassStart, compassStart]);
                compassTooltipMarker.setLatLng(compassStart);
                compassTooltipMarker.bindTooltip(headingTooltip).openTooltip();
                compassTooltipMarker.setTooltipContent('0°');
            } else {
                // Second click clears it to start a new measurement
                compassStart = null;
                compassLine.setLatLngs([]);
                compassTooltipMarker.unbindTooltip();
            }
        }

        // Calculate standard compass bearing (heading) between two coordinates
        function calculateBearing(latlng1, latlng2) {
            const toRad = Math.PI / 180;
            const toDeg = 180 / Math.PI;
            const lat1 = latlng1.lat * toRad;
            const lat2 = latlng2.lat * toRad;
            const dLon = (latlng2.lng - latlng1.lng) * toRad;

            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);

            let brng = Math.atan2(y, x) * toDeg;
            return (brng + 360) % 360; // Normalize 0-360
        }
        
        // Custom Leaflet Control for the Ruler Button
        let rulerActive = false;
        let rulerStart = null;
        let rulerLine = L.polyline([], {color: '#10b981', weight: 3, dashArray: '5, 5'}).addTo(map);
        
        const distanceTooltip = L.tooltip({
            permanent: true,
            direction: 'right',
            className: 'font-bold text-green-700 bg-white px-2 py-1 rounded shadow-md border border-green-200 text-sm'
        });
        
        let rulerTooltipMarker = L.marker([0,0], {
            icon: L.divIcon({className: 'hidden'}),
            interactive: false
        }).addTo(map);

        const RulerControl = L.Control.extend({
            options: { position: 'topright' },
            onAdd: function() {
                const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                const btn = L.DomUtil.create('a', 'ruler-control-btn', container);
                btn.innerHTML = '📏';
                btn.title = 'Measure Distance';
                btn.href = '#';
                
                L.DomEvent.on(btn, 'click', L.DomEvent.stop);
                L.DomEvent.on(btn, 'click', (e) => {
                    e.preventDefault();
                    toggleRulerMode(btn);
                });
                return container;
            }
        });
        map.addControl(new RulerControl());

        // --- NEW DRAWING TOOLS CONTROL ---
        const DrawToolsControl = L.Control.extend({
            options: { position: 'topright' },
            onAdd: function() {
                // Initial container hidden. Will be switched to 'flex' when drawing
                const container = L.DomUtil.create('div', 'draw-tool-ui hidden flex-col gap-2 mt-2 mr-2.5');
                
                // Rotate Increment Toggle Button
                const rotBtn = L.DomUtil.create('button', 'compass-control-btn', container);
                rotBtn.innerHTML = `⟳ ${rotateIncrements[currentRotateIdx]}°`;
                rotBtn.title = 'Click to change rotation increment';
                rotBtn.style.color = '#ea580c'; // Orange to match drawing theme
                rotBtn.style.borderColor = '#ea580c';
                rotBtn.style.width = '48px';
                rotBtn.style.fontSize = '12px';
                rotBtn.style.fontWeight = 'bold';

                // Scale Increment Toggle Button
                const scaleBtn = L.DomUtil.create('button', 'compass-control-btn', container);
                scaleBtn.innerHTML = `⤢ ${scaleIncrements[currentScaleIdx]}mi`;
                scaleBtn.title = 'Click to change scale increment';
                scaleBtn.style.color = '#ea580c';
                scaleBtn.style.borderColor = '#ea580c';
                scaleBtn.style.width = '48px';
                scaleBtn.style.fontSize = '12px';
                scaleBtn.style.fontWeight = 'bold';

                // Prevent map clicks when clicking the tools
                L.DomEvent.disableClickPropagation(container);
                
                // Click events to cycle increments
                L.DomEvent.on(rotBtn, 'click', (e) => {
                    e.preventDefault();
                    currentRotateIdx = (currentRotateIdx + 1) % rotateIncrements.length;
                    rotBtn.innerHTML = `⟳ ${rotateIncrements[currentRotateIdx]}°`;
                });

                L.DomEvent.on(scaleBtn, 'click', (e) => {
                    e.preventDefault();
                    currentScaleIdx = (currentScaleIdx + 1) % scaleIncrements.length;
                    const val = scaleIncrements[currentScaleIdx];
                    scaleBtn.innerHTML = `⤢ ${val}mi`;
                });

                return container;
            }
        });
        map.addControl(new DrawToolsControl());

        function toggleRulerMode(btn) {
            // Turn off compass if active
            if (compassActive) {
                const compassBtn = document.querySelector('.compass-control-btn');
                if(compassBtn) toggleCompassMode(compassBtn);
            }

            rulerActive = !rulerActive;
            const mapContainer = document.getElementById('map');
            
            if (rulerActive) {
                btn.classList.add('active');
                mapContainer.classList.add('crosshair-cursor-map');
                showNotification("Ruler Active: Click map to set origin.", 3000);
            } else {
                btn.classList.remove('active');
                mapContainer.classList.remove('crosshair-cursor-map');
                rulerStart = null;
                rulerLine.setLatLngs([]);
                rulerTooltipMarker.unbindTooltip();
                showNotification("Ruler Deactivated.", 2000);
            }
        }

        function handleRulerMapClick(e) {
            if (!rulerStart) {
                // First click sets the origin anchor
                rulerStart = e.latlng;
                rulerLine.setLatLngs([rulerStart, rulerStart]);
                rulerTooltipMarker.setLatLng(rulerStart);
                rulerTooltipMarker.bindTooltip(distanceTooltip).openTooltip();
                rulerTooltipMarker.setTooltipContent('0 mi');
            } else {
                // Second click clears it to start a new measurement
                rulerStart = null;
                rulerLine.setLatLngs([]);
                rulerTooltipMarker.unbindTooltip();
            }
        }

        map.on('mousemove', function(e) {
            if (compassActive && compassStart) {
                // Draw line from start anchor to current mouse pos
                compassLine.setLatLngs([compassStart, e.latlng]);
                
                // Calculate and display heading
                const bearing = calculateBearing(compassStart, e.latlng);
                
                compassTooltipMarker.setLatLng(e.latlng);
                if(!compassTooltipMarker.getTooltip()) {
                    compassTooltipMarker.bindTooltip(headingTooltip).openTooltip();
                }
                compassTooltipMarker.setTooltipContent(`${Math.round(bearing)}°`);
            }

            if (rulerActive && rulerStart) {
                // Draw line from start anchor to current mouse pos
                rulerLine.setLatLngs([rulerStart, e.latlng]);
                
                // Calculate and display distance in miles
                // Leaflet's distanceTo() returns meters. Multiply by 0.000621371 to get miles.
                const distanceMeters = rulerStart.distanceTo(e.latlng);
                const distanceMiles = distanceMeters * 0.000621371;
                
                rulerTooltipMarker.setLatLng(e.latlng);
                if(!rulerTooltipMarker.getTooltip()) {
                    rulerTooltipMarker.bindTooltip(distanceTooltip).openTooltip();
                }
                rulerTooltipMarker.setTooltipContent(`${distanceMiles.toFixed(1)} mi`);
            }
            
            // Track mouse globally and update interactive holding pattern
            lastMouseLatLng = e.latlng;
            if (isDrawingHold) {
                const pts = generateHoldPoints(lastMouseLatLng, drawHoldParams.shape, drawHoldParams.points, drawHoldParams.dist, drawHoldParams.loops, drawHoldParams.angle);
                ghostHoldLine.setLatLngs(pts);
                
                drawTooltipMarker.setLatLng(lastMouseLatLng);
                if(!drawTooltipMarker.getTooltip()) {
                    drawTooltipMarker.bindTooltip(drawTooltip).openTooltip();
                }
                
                const fmtAngle = drawHoldParams.angle % 1 === 0 ? drawHoldParams.angle : drawHoldParams.angle.toFixed(1);
                const fmtDist = drawHoldParams.dist % 1 === 0 ? drawHoldParams.dist : drawHoldParams.dist.toFixed(1);
                
                drawTooltipMarker.setTooltipContent(`${fmtDist} mi | ${fmtAngle}°`);
            }
        });

        // Wheel event for rotating and scaling interactive hold
        document.getElementById('map').addEventListener('wheel', (e) => {
            if (!isDrawingHold) return;
            
            // Allow native map zooming if Shift is held
            if (e.shiftKey) return; 

            // Otherwise intercept for our drawing tools
            e.preventDefault(); // Prevent native browser zoom/scroll
            e.stopPropagation(); // Stop Leaflet from seeing it and zooming the map
            
            if (e.ctrlKey) {
                // Scale distance using selected increment
                const scaleInc = scaleIncrements[currentScaleIdx];
                drawHoldParams.dist += e.deltaY < 0 ? scaleInc : -scaleInc;
                drawHoldParams.dist = Math.max(0.1, drawHoldParams.dist);
            } else {
                // Rotate angle using selected increment
                const rotInc = rotateIncrements[currentRotateIdx];
                drawHoldParams.angle += e.deltaY < 0 ? rotInc : -rotInc;
                drawHoldParams.angle = (drawHoldParams.angle + 360) % 360;
            }
            
            // Re-render ghost immediately
            if (lastMouseLatLng) {
                const pts = generateHoldPoints(lastMouseLatLng, drawHoldParams.shape, drawHoldParams.points, drawHoldParams.dist, drawHoldParams.loops, drawHoldParams.angle);
                ghostHoldLine.setLatLngs(pts);
                
                const fmtAngle = drawHoldParams.angle % 1 === 0 ? drawHoldParams.angle : drawHoldParams.angle.toFixed(1);
                const fmtDist = drawHoldParams.dist % 1 === 0 ? drawHoldParams.dist : drawHoldParams.dist.toFixed(1);
                
                drawTooltipMarker.setTooltipContent(`${fmtDist} mi | ${fmtAngle}°`);
            }
        }, { passive: false, capture: true });

        // Cancel with Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isDrawingHold) {
                exitDrawMode();
            }
        });

        const searchInput = document.getElementById('airport-search');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            searchResults.innerHTML = '';
            
            if (!query) {
                searchResults.classList.add('hidden');
                return;
            }

            // Filter massive global dataset by name, IATA, ICAO, or City
            const filtered = globalAirports.filter(a => 
                (a.name && a.name.toLowerCase().includes(query)) || 
                (a.iata && a.iata.toLowerCase().includes(query)) ||
                (a.icao && a.icao.toLowerCase().includes(query)) ||
                (a.city && a.city.toLowerCase().includes(query))
            ).slice(0, 8); // Show max 8 results for performance

            if (filtered.length > 0) {
                searchResults.classList.remove('hidden');
                filtered.forEach(airport => {
                    const li = document.createElement('li');
                    li.className = 'px-4 py-3 hover:bg-blue-50 cursor-pointer flex justify-between items-center border-b border-gray-100 last:border-0 transition-colors';
                    
                    const codeDisplay = airport.iata ? airport.iata : (airport.icao || 'N/A');
                    
                    li.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="flex-shrink-0">${planeSvg}</div>
                            <div class="flex flex-col truncate">
                                <span class="font-medium text-gray-800 truncate">${airport.name}</span>
                                <span class="text-xs text-gray-500">${airport.city || 'Unknown City'}, ${airport.country || ''}</span>
                            </div>
                        </div>
                        <span class="flex-shrink-0 ml-2 text-xs font-bold text-blue-700 bg-blue-100 px-2 py-1 rounded-md shadow-sm border border-blue-200">${codeDisplay}</span>
                    `;
                    
                    li.addEventListener('click', () => {
                        const latlng = L.latLng(airport.lat, airport.lon);
                        
                        // Fly map to the airport smoothly and zoom in enough to reveal it
                        map.flyTo(latlng, Math.max(map.getZoom(), 8), { duration: 1.5 });
                        
                        // Add to route
                        addWaypoint(latlng);
                        
                        // Reset search
                        searchInput.value = '';
                        searchResults.classList.add('hidden');
                    });
                    
                    searchResults.appendChild(li);
                });
            } else {
                searchResults.classList.remove('hidden');
                searchResults.innerHTML = '<li class="px-4 py-3 text-sm text-gray-500 text-center">No airports found</li>';
            }
        });

        // Close search dropdown if clicked outside
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.add('hidden');
            }
        });

        // Undo Button Logic
        undoBtn.addEventListener('click', () => {
            if (waypoints.length === 0) return;
            waypoints.pop();
            renderRoute();
        });

        // Clear All Button Logic
        clearBtn.addEventListener('click', () => {
            if (waypoints.length === 0) return;
            waypoints = [];
            renderRoute();
        });

        // Copy Route String Logic
        copyBtn.addEventListener('click', () => {
            if (routeOutput.value.trim() === '') return;

            // Using the robust select and execCommand for broad iframe compatibility
            routeOutput.select();
            routeOutput.setSelectionRange(0, 99999); // For mobile devices
            
            try {
                document.execCommand('copy');
                showNotification('Copied to clipboard!');
            } catch (err) {
                console.error('Fallback copy failed', err);
            }
            
            // Deselect
            window.getSelection().removeAllRanges();
        });

        // Toast Notification Function
        let toastTimeout;
        function showNotification(message, duration = 2500) {
            toast.innerText = message;
            toast.style.opacity = '1';
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.style.opacity = '0';
            }, duration);
        }

        /* -------------------------------------------------------------
           Context Menu & Holding Point Generation Logic
           ------------------------------------------------------------- */
        
        const contextMenu = document.getElementById('context-menu');
        const holdDialog = document.getElementById('holding-dialog');
        
        // Hide context menu when clicking anywhere else
        map.on('click', () => contextMenu.classList.add('hidden'));
        document.addEventListener('click', (e) => {
            if(!e.target.closest('.waypoint-marker') && !contextMenu.contains(e.target)) {
                contextMenu.classList.add('hidden');
            }
        });

        // Show holding point dialog
        document.getElementById('cm-holding-point').addEventListener('click', () => {
            contextMenu.classList.add('hidden');
            holdDialog.classList.remove('hidden');
        });

        // Show interactive drawing dialog
        const drawShapeDialog = document.getElementById('draw-shape-dialog');
        
        document.getElementById('cm-draw-hold').addEventListener('click', () => {
            contextMenu.classList.add('hidden');
            drawShapeDialog.classList.remove('hidden');
            drawHoldActiveIndex = activeWaypointIndex;
        });

        document.getElementById('draw-close-icon').addEventListener('click', () => {
            drawShapeDialog.classList.add('hidden');
            drawHoldActiveIndex = -1;
        });

        document.querySelectorAll('.shape-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                drawHoldParams.shape = e.target.getAttribute('data-shape');
                drawShapeDialog.classList.add('hidden');
                
                // Enter interactive drawing mode
                isDrawingHold = true;
                document.getElementById('map').classList.add('crosshair-cursor-map');
                
                // Show increment toggles
                const drawUi = document.querySelector('.draw-tool-ui');
                if (drawUi) {
                    drawUi.classList.remove('hidden');
                    drawUi.classList.add('flex');
                }

                showNotification("Scroll to Rotate. Ctrl+Scroll: Scale. Shift+Scroll: Zoom.", 6000);
            });
        });
        
        // Delete a specific point
        document.getElementById('cm-delete-point').addEventListener('click', () => {
            contextMenu.classList.add('hidden');
            if(activeWaypointIndex > -1) {
                waypoints.splice(activeWaypointIndex, 1);
                renderRoute();
            }
        });

        // Close Dialog
        document.getElementById('hold-cancel').addEventListener('click', () => {
            holdDialog.classList.add('hidden');
            activeWaypointIndex = -1;
        });

        // Close Dialog via X icon
        document.getElementById('hold-close-icon').addEventListener('click', () => {
            holdDialog.classList.add('hidden');
            activeWaypointIndex = -1;
        });

        // Extracted math function for generating hold shapes
        function generateHoldPoints(anchor, shape, P, D, L_loops, userAngle) {
            const rotRad = (90 - userAngle) * (Math.PI / 180);
            const newPoints = [];
            
            // 1 degree of latitude is exactly ~69.05 miles.
            const milesToDeg = 1 / 69.05;
            
            let R = 0; 
            let W = 0; 
            
            if (shape === 'capsule') {
                W = D * milesToDeg;        
                R = (D * 0.3) * milesToDeg; 
            } else if (shape === 'circle') {
                R = (D / 2) * milesToDeg;  
            }
            
            const latCos = Math.cos(anchor.lat * Math.PI / 180);
            const lngScale = latCos === 0 ? 1 : 1 / latCos;
            
            const len1 = W; 
            const len2 = Math.PI * R; 
            const len3 = W; 
            const len4 = Math.PI * R; 
            
            const S1 = len1;
            const S2 = S1 + len2;
            const S3 = S2 + len3;
            const S4 = S3 + len4;
            const totalS = S4;
            
            for(let loop = 0; loop < L_loops; loop++) {
                for(let i = 1; i <= P; i++) { 
                    let dy = 0, dx = 0;
                    
                    if (shape === 'figure8') {
                        const t = (i / P) * 2 * Math.PI;
                        dx = (D / 2) * milesToDeg * Math.sin(t);
                        dy = (D / 2) * milesToDeg * Math.sin(t) * Math.cos(t) * 2; 
                    } else {
                        const d = (i / P) * totalS;
                        
                        if (d <= S1) {
                            const p = S1 === 0 ? 0 : d / S1;
                            dx = p * W;
                            dy = 0;
                        } else if (d <= S2) {
                            const p = (d - S1) / len2;
                            const theta = -Math.PI/2 + p * Math.PI;
                            dx = W + R * Math.cos(theta);
                            dy = R + R * Math.sin(theta);
                        } else if (d <= S3) {
                            const p = len3 === 0 ? 0 : (d - S2) / len3;
                            dx = W - p * W;
                            dy = 2 * R;
                        } else {
                            const p = (d - S3) / len4;
                            const theta = Math.PI/2 + p * Math.PI;
                            dx = R * Math.cos(theta);
                            dy = R + R * Math.sin(theta);
                        }
                    }
                    
                    const dxRot = dx * Math.cos(rotRad) - dy * Math.sin(rotRad);
                    const dyRot = dx * Math.sin(rotRad) + dy * Math.cos(rotRad);
                    
                    const pt = L.latLng(
                        anchor.lat + dyRot, 
                        anchor.lng + (dxRot * lngScale)
                    );
                    newPoints.push(pt);
                }
            }
            return newPoints;
        }

        // Generate Holding Pattern
        document.getElementById('hold-generate').addEventListener('click', () => {
            if(activeWaypointIndex === -1) return;
            
            const shape = document.getElementById('hold-shape').value;
            const P = parseInt(document.getElementById('hold-points').value);
            const D = parseFloat(document.getElementById('hold-dist').value);
            const L_loops = parseInt(document.getElementById('hold-loops').value);
            const userAngle = parseInt(document.getElementById('hold-angle').value);
            
            const anchor = waypoints[activeWaypointIndex];
            const newPoints = generateHoldPoints(anchor, shape, P, D, L_loops, userAngle);
            
            // Insert pattern points into the route immediately after the clicked waypoint
            waypoints.splice(activeWaypointIndex + 1, 0, ...newPoints);
            renderRoute();
            
            holdDialog.classList.add('hidden');
            activeWaypointIndex = -1;
        });

        // Fetch airports now that UI elements are initialized
        fetchAirports();

        // Initial UI setup run
        updateUI();

    </script>
</body>
